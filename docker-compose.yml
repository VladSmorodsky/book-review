services:
    mysqldb:
        image: mysql:9.3
        container_name: my-mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql

    redis:
        image: redis:8.0
        ports:
            - '6379:6379'

volumes:
    mysql_data:
